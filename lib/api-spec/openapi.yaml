openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analysis
    description: Chart analysis operations
  - name: history
    description: User analysis history
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analyze-chart:
    post:
      operationId: analyzeChartImage
      tags: [analysis]
      summary: Analyze a chart image using AI
      description: Sends a chart image to the AI vision model and returns a structured trade plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeChartRequest"
      responses:
        "200":
          description: AI-generated trade plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartAnalysisResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisError"
        "500":
          description: Analysis failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisError"
  /history:
    get:
      operationId: getUserHistory
      tags: [history]
      summary: Get current user's analysis history
      description: Returns all saved chart analyses for the authenticated user
      responses:
        "200":
          description: List of user analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEntry"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisError"
  /history/{id}:
    delete:
      operationId: deleteHistoryEntry
      tags: [history]
      summary: Delete a history entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeChartRequest:
      type: object
      properties:
        imageDataUrl:
          type: string
          description: Base64 data URL of the chart image
      required:
        - imageDataUrl
    ChartAnalysisResult:
      type: object
      properties:
        id:
          type: string
          description: Database ID of the saved analysis (only present when user is signed in)
        context:
          type: string
          description: Asset/instrument name (e.g. EUR/USD, BTC/USD, Apple Inc.)
        timeframe:
          type: string
          description: Chart timeframe if visible (e.g. 1H, 4H, Daily)
        priceMin:
          type: number
          description: Lowest price visible on the right axis
        priceMax:
          type: number
          description: Highest price visible on the right axis
        direction:
          type: string
          enum: [BUY, SELL]
        entry:
          type: number
        sl:
          type: number
        tp1:
          type: number
        tp2:
          type: number
        tp3:
          type: number
        confidence:
          type: string
          enum: [LOW, MEDIUM, GOOD]
        confidenceScore:
          type: number
          minimum: 0
          maximum: 100
        explanation:
          type: string
        setupQuality:
          type: string
        keyLevels:
          type: string
      required:
        - context
        - timeframe
        - priceMin
        - priceMax
        - direction
        - entry
        - sl
        - tp1
        - tp2
        - tp3
        - confidence
        - confidenceScore
        - explanation
        - setupQuality
        - keyLevels
    HistoryEntry:
      type: object
      properties:
        id:
          type: string
        context:
          type: string
        timeframe:
          type: string
        direction:
          type: string
          enum: [BUY, SELL]
        entry:
          type: number
        sl:
          type: number
        tp1:
          type: number
        tp2:
          type: number
        tp3:
          type: number
        rrRatio:
          type: number
        rrTp1:
          type: number
        rrTp2:
          type: number
        rrTp3:
          type: number
        confidence:
          type: string
        confidenceScore:
          type: number
        explanation:
          type: string
        setupQuality:
          type: string
        keyLevels:
          type: string
        priceMin:
          type: number
        priceMax:
          type: number
        imageDataUrl:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - context
        - timeframe
        - direction
        - entry
        - sl
        - tp1
        - tp2
        - tp3
        - rrRatio
        - rrTp1
        - rrTp2
        - rrTp3
        - confidence
        - confidenceScore
        - explanation
        - setupQuality
        - keyLevels
        - priceMin
        - priceMax
        - imageDataUrl
        - createdAt
    AnalysisError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
