<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>ChartAttack — AI Trade Plan from Any Chart Screenshot</title>
    <meta name="description" content="Tired of endless analysis? Upload any trading chart screenshot and get an instant AI-generated trade plan with entry, stop loss, and take-profit levels. Free for beginners." />
    <meta name="keywords" content="chart analysis, trade plan, AI trading, TradingView analysis, stop loss, take profit, risk reward, beginner trading, chart screenshot, MT4, MT5" />
    <meta name="author" content="ChartAttack" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://chartattack.replit.app/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Discord) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chartattack.replit.app/" />
    <meta property="og:title" content="ChartAttack — AI Trade Plan from Any Chart Screenshot" />
    <meta property="og:description" content="Tired of endless analysis? Just bite your trading instantly. Upload a chart, get entry, SL, TP1/TP2/TP3 and risk/reward in seconds." />
    <meta property="og:image" content="https://chartattack.replit.app/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="ChartAttack" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://chartattack.replit.app/" />
    <meta name="twitter:title" content="ChartAttack — AI Trade Plan from Any Chart Screenshot" />
    <meta name="twitter:description" content="Tired of endless analysis? Just bite your trading instantly. Upload a chart, get entry, SL, TP1/TP2/TP3 and risk/reward in seconds." />
    <meta name="twitter:image" content="https://chartattack.replit.app/opengraph.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- JSON-LD Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ChartAttack",
      "url": "https://chartattack.replit.app/",
      "description": "AI-powered trade plan generator for beginner traders. Upload any chart screenshot and instantly receive entry, stop loss, and take-profit levels with risk/reward ratios and educational explanations.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "AI chart analysis from screenshot",
        "Entry price detection",
        "Stop loss calculation",
        "Take profit levels TP1 TP2 TP3",
        "Risk reward ratio",
        "Educational trade explanations",
        "Supports TradingView MT4 MT5 charts",
        "Analysis history saved per user"
      ],
      "audience": {
        "@type": "Audience",
        "audienceType": "Beginner traders, retail forex traders, stock market beginners"
      }
    }
    </script>

    <!-- JSON-LD Structured Data: FAQPage (boosts AI citation and featured snippets) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is ChartAttack?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ChartAttack is a free AI-powered tool that analyzes trading chart screenshots and generates a complete trade plan including entry price, stop loss, and TP1/TP2/TP3 take-profit levels with risk/reward ratios, designed for beginner traders."
          }
        },
        {
          "@type": "Question",
          "name": "Which chart platforms does ChartAttack support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ChartAttack works with screenshots from any charting platform including TradingView, MetaTrader 4 (MT4), MetaTrader 5 (MT5), and broker-specific chart tools."
          }
        },
        {
          "@type": "Question",
          "name": "How does ChartAttack generate a trade plan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You upload a screenshot of any trading chart. ChartAttack's AI vision model analyzes the chart, identifies key price levels, support and resistance zones, and trend direction, then outputs a structured trade plan with entry, stop loss, and multiple take-profit targets."
          }
        },
        {
          "@type": "Question",
          "name": "Is ChartAttack free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, ChartAttack is free. Sign up with email or Google to save your analysis history."
          }
        },
        {
          "@type": "Question",
          "name": "What is risk/reward ratio in trading?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Risk/reward ratio compares the potential loss (distance from entry to stop loss) with the potential gain (distance from entry to take profit). A 1:2 ratio means you risk 1 unit to potentially gain 2. ChartAttack calculates this automatically for each trade plan."
          }
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
